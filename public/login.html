<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Core metadata for browser rendering and responsive layout -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Charity Minds</title>
  <!-- Shared compiled stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
  <!-- Top navigation -->
  <header class="bg-blue-400">
    <nav class="max-w-6xl mx-auto flex justify-between items-center py-4 px-6">
      <!-- Brand block -->
      <div class="flex items-center space-x-2">
        <img class="h-9 w-auto mr-2" src="assets/images/logo.png" alt="Charity Minds logo">
        <span class="font-bold">CHARITY MINDS</span>
      </div>
      <!-- Page links -->
      <ul class="flex gap-4 ml-auto">
        <li><a href="index.html" class="text-red-700">Home</a></li>
        <li><a href="Register.html" class="text-red-700">Register</a></li>
        <li><a href="dashboard.html" class="text-red-700">Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <!-- Login form section -->
  <main class="flex-grow flex items-center justify-center px-4">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
      <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">Log in</h1>
      <form action="#" method="post" autocomplete="on" class="space-y-4">
        <!-- Email or username field -->
        <div>
          <label for="loginIdentifier" class="block text-sm font-medium text-gray-700 mb-1">Email or Username</label>
          <input
            id="loginIdentifier"
            name="loginIdentifier"
            type="text"
            required
            placeholder="Enter your email or username"
            class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-400 outline-none"
          >
        </div>
        <!-- Password field -->
        <div>
          <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            id="loginPassword"
            name="loginPassword"
            type="password"
            required
            placeholder="Enter your password"
            class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-400 outline-none"
          >
        </div>
        <!-- Remember-me toggle -->
        <div class="flex items-center space-x-2">
          <input
            id="remember"
            name="remember"
            type="checkbox"
            class="h-4 w-4 text-blue-500 border-gray-300 rounded focus:ring-2 focus:ring-blue-400"
          >
          <label for="remember" class="text-sm text-gray-700">Remember me</label>
        </div>
        <!-- Submit button -->
        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition"
        >
          Login
        </button>
      </form>
      <!-- Link to registration page -->
      <div class="text-center mt-4 text-gray-600">
        <p>
          Don't have an account?
          <a href="Register.html" class="text-blue-500 hover:underline">Register here</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Footer section -->
  <footer class="bg-blue-400 text-white text-center fixed bottom-0 w-full p-4">
    Ac 2025 Login | Designed by Brian
  </footer>
</body>
</html>
